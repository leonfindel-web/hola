name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint-test:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root deps
        run: npm install --no-audit --no-fund

      - name: Install per-package deps
        run: |
          npm --prefix apps/web install --no-audit --no-fund
          npm --prefix workers/ingest install --no-audit --no-fund
          npm --prefix workers/search install --no-audit --no-fund

      - name: Prettier check
        run: npx prettier --check .

      - name: Type check
        run: |
          npm --prefix workers/ingest run typecheck
          npm --prefix workers/search run typecheck
          npm --prefix apps/web run typecheck

      - name: Tests
        run: |
          npm --prefix workers/ingest test
          npm --prefix workers/search test

  deploy-workers:
    name: Deploy Workers
    needs: lint-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: |
          npm --prefix workers/ingest install --no-audit --no-fund
          npm --prefix workers/search install --no-audit --no-fund

      - name: Deploy ingest
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/ingest
          command: deploy

      - name: Deploy search
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/search
          command: deploy

  deploy-pages:
    name: Deploy Pages
    needs: [lint-test, deploy-workers]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm --prefix apps/web install --no-audit --no-fund

      - name: Build
        env:
          PUBLIC_SEARCH_API: https://leonfindel-search.${{ secrets.CLOUDFLARE_WORKERS_SUBDOMAIN }}.workers.dev
        run: npm --prefix apps/web run build

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: pages deploy dist --project-name=leonfindel
